version: '3.8'

services:
  postgres:
    image: postgres:18
    container_name: docgraph-postgres
    environment:
      POSTGRES_USER: docgraph
      POSTGRES_PASSWORD: docgraph
      POSTGRES_DB: docgraph
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docgraph"]
      interval: 5s
      timeout: 5s
      retries: 5

  docgraph:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docgraph-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DOCGRAPH_DATABASE_HOST=postgres
      - DOCGRAPH_DATABASE_NAME=docgraph
      - DOCGRAPH_DATABASE_USER=docgraph
      - DOCGRAPH_DATABASE_PASSWORD=docgraph
      - DOCGRAPH_SERVER_HOST=0.0.0.0
      - DOCGRAPH_SERVER_PORT=5100
      - RUST_LOG=info,docgraph=debug
    ports:
      - "5100:5100"
    restart: unless-stopped

volumes:
  postgres-data: